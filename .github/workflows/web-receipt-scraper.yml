name: Web Receipt Scraper

on:
  schedule:
    # Run monthly on the 3rd at 2:00 AM JST (17:00 UTC previous day)
    - cron: '0 17 3 * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to fetch (stripe, aws, gcp, all)'
        required: false
        default: 'all'

permissions:
  contents: read

concurrency:
  group: web-receipt-scraper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-invoices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # `inputs` only exists for workflow_dispatch. Guard with event_name for other triggers.
      SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source || 'all' }}
      HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
      HAS_GCP_CREDS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON_PATH != '' && secrets.GCP_BILLING_ACCOUNT_ID != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Stripe: API-based fetching (avoids CAPTCHA)
      - name: Fetch Stripe invoices
        id: stripe
        if: ${{ env.SOURCE == 'stripe' || env.SOURCE == 'all' }}
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/stripe-invoice-fetcher.js --range=last_90_days --limit=10
        continue-on-error: true

      # AWS: Cost Explorer API (requires IAM credentials)
      - name: Fetch AWS invoices
        if: ${{ (env.SOURCE == 'aws' || env.SOURCE == 'all') && env.HAS_AWS_CREDS == 'true' }}
        id: aws
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/aws-invoice-fetcher.js
        continue-on-error: true

      # GCP: Cloud Billing API (requires service account)
      - name: Prepare GCP credentials
        id: gcp_creds
        if: ${{ (env.SOURCE == 'gcp' || env.SOURCE == 'all') && secrets.GCP_SERVICE_ACCOUNT_JSON_PATH != '' }}
        env:
          GCP_SERVICE_ACCOUNT_JSON_PATH: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON_PATH }}
        run: |
          set -euo pipefail
          # Support either:
          # 1) secret contains JSON content (most common), or
          # 2) secret contains a runner path to a JSON file (legacy).
          if [[ "$GCP_SERVICE_ACCOUNT_JSON_PATH" == \{* ]]; then
            cred_file="$PWD/gcp-service-account.json"
            printf '%s' "$GCP_SERVICE_ACCOUNT_JSON_PATH" > "$cred_file"
            chmod 600 "$cred_file"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$cred_file" >> "$GITHUB_ENV"
          else
            echo "GOOGLE_APPLICATION_CREDENTIALS=$GCP_SERVICE_ACCOUNT_JSON_PATH" >> "$GITHUB_ENV"
          fi

      - name: Fetch GCP invoices
        if: ${{ (env.SOURCE == 'gcp' || env.SOURCE == 'all') && env.HAS_GCP_CREDS == 'true' }}
        id: gcp
        env:
          GCP_BILLING_ACCOUNT_ID: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/gcp-invoice-fetcher.js
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Web Receipt Scraper" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: ${{ env.SOURCE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Step Outcomes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stripe: ${{ steps.stripe.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- AWS: ${{ steps.aws.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GCP creds: ${{ steps.gcp_creds.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GCP: ${{ steps.gcp.outcome || 'skipped' }}" >> "$GITHUB_STEP_SUMMARY"
