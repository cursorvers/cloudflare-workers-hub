name: Web Receipt Scraper

on:
  schedule:
    # Run monthly on the 3rd at 2:00 AM JST (17:00 UTC previous day)
    - cron: '0 17 3 * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to fetch (stripe, aws, gcp, all)'
        required: false
        default: 'all'

jobs:
  fetch-invoices:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Stripe: API-based fetching (avoids CAPTCHA)
      - name: Fetch Stripe invoices
        if: >-
          github.event.inputs.source == 'stripe' ||
          github.event.inputs.source == 'all' ||
          github.event.inputs.source == ''
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/stripe-invoice-fetcher.js --range=last_90_days --limit=10
        continue-on-error: true

      # AWS: Cost Explorer API (requires IAM credentials)
      - name: Fetch AWS invoices
        if: >-
          (github.event.inputs.source == 'aws' ||
          github.event.inputs.source == 'all' ||
          github.event.inputs.source == '') &&
          env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/aws-invoice-fetcher.js
        continue-on-error: true

      # GCP: Cloud Billing API (requires service account)
      - name: Fetch GCP invoices
        if: >-
          (github.event.inputs.source == 'gcp' ||
          github.event.inputs.source == 'all' ||
          github.event.inputs.source == '') &&
          env.GCP_BILLING_ACCOUNT_ID != ''
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON_PATH }}
          GCP_BILLING_ACCOUNT_ID: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
        run: node scripts/gcp-invoice-fetcher.js
        continue-on-error: true

      - name: Summary
        run: echo "Invoice fetching complete. Check individual step logs for results."
