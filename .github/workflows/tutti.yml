name: FUGUE Tutti Review

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: tutti-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  tutti-review:
    name: Tutti 6-Parallel Review
    if: |
      contains(github.event.issue.labels.*.name, 'fugue-task') &&
      contains(github.event.issue.labels.*.name, 'tutti')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - provider: codex
            agent: architect
            script: delegate.js
          - provider: codex
            agent: security-analyst
            script: delegate.js
          - provider: codex
            agent: code-reviewer
            script: delegate.js
          - provider: glm
            agent: math-reasoning
            script: delegate-glm.js
          - provider: glm
            agent: code-reviewer
            script: delegate-glm.js
          - provider: glm
            agent: general-reviewer
            script: delegate-glm.js
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm install openai 2>/dev/null || true
          npm install -g @openai/codex 2>/dev/null || true

      - name: Setup Codex CLI auth (Pro subscription)
        if: matrix.provider == 'codex'
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json
          cat > ~/.codex/config.toml << 'TOML'
          approval_policy = "never"
          sandbox_mode = "read-only"
          model = "gpt-5.2-codex"
          model_reasoning_effort = "medium"
          TOML

      - name: Extract task from issue
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          TASK=$(echo "$ISSUE_BODY" | head -50)
          echo "task<<EOFTASK" >> "$GITHUB_OUTPUT"
          echo "$ISSUE_TITLE: $TASK" >> "$GITHUB_OUTPUT"
          echo "EOFTASK" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.provider }} ${{ matrix.agent }}
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          node skills/orchestra-delegator/scripts/${{ matrix.script }} \
            -a "${{ matrix.agent }}" \
            -t "${{ steps.extract.outputs.task }}" \
            2>&1 | tee "/tmp/${{ matrix.provider }}-${{ matrix.agent }}.log" || true

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tutti-${{ matrix.provider }}-${{ matrix.agent }}
          path: |
            /tmp/${{ matrix.provider }}-${{ matrix.agent }}.log
            skills/orchestra-delegator/output/

  integrate:
    name: Integrate Tutti Results
    needs: tutti-review
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/tutti-results

      - name: Aggregate and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          REPORT="## 🎵 Tutti Review Results\n\n"
          REPORT+="| Provider | Agent | Status | Log |\n"
          REPORT+="|----------|-------|--------|-----|\n"

          for dir in /tmp/tutti-results/tutti-*/; do
            [ -d "$dir" ] || continue
            DIRNAME=$(basename "$dir")
            PROVIDER=$(echo "$DIRNAME" | sed 's/tutti-//' | cut -d'-' -f1)
            AGENT=$(echo "$DIRNAME" | sed 's/tutti-[^-]*-//')
            LOG=$(find "$dir" -name "*.log" -print -quit 2>/dev/null)

            if [ -f "$LOG" ]; then
              LINES=$(wc -l < "$LOG" | tr -d ' ')
              if grep -qE "処理時間|elapsed|Result" "$LOG"; then
                STATUS="✅ Pass"
              elif [ "$LINES" -gt 3 ]; then
                STATUS="⚠️ Partial"
              else
                STATUS="❌ Error"
              fi
            else
              STATUS="❌ No output"
              LINES=0
            fi

            REPORT+="| $PROVIDER | $AGENT | $STATUS | ${LINES} lines |\n"
          done

          # Append detailed results
          REPORT+="\n### Detailed Results\n\n"
          for dir in /tmp/tutti-results/tutti-*/; do
            [ -d "$dir" ] || continue
            DIRNAME=$(basename "$dir")
            LOG=$(find "$dir" -name "*.log" -print -quit 2>/dev/null)
            if [ -f "$LOG" ]; then
              REPORT+="<details>\n<summary>${DIRNAME}</summary>\n\n\`\`\`\n"
              REPORT+="$(head -100 "$LOG")\n"
              REPORT+="\`\`\`\n</details>\n\n"
            fi
          done

          REPORT+="\n---\n🤖 Generated by FUGUE Tutti GHA24"

          echo -e "$REPORT" | gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file -
